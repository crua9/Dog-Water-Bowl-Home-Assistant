                                  media_content_id: media-source://media_source/mp3/.
                              browse_entity_id: media_player.my_bedroom_mini
                        continue_on_error: true
                      - action: media_player.play_media
                        metadata: {}
                        target:
                          entity_id:
                            - media_player.kitchen_display
                        data:
                          media:
                            media_content_id: media-source://media_source/mp3/dog_15_min.mp3
                            media_content_type: audio/mpeg
                            metadata:
                              title: dog_15_min.mp3
                              thumbnail: null
                              media_class: music
                              children_media_class: null
                              navigateIds:
                                - {}
                                - media_content_type: app
                                  media_content_id: media-source://media_source
                                - media_content_type: ""
                                  media_content_id: media-source://media_source/mp3/.
                              browse_entity_id: media_player.my_bedroom_mini
                        continue_on_error: true
                      - action: media_player.play_media
                        metadata: {}
                        target:
