esphome:
  name: dog-water-sensor
  friendly_name: Dog Water Sensor

# --- WIRING CHEAT SHEET (Reference this for Dad) ---
# HX711 DT (Data)  -> GPIO18 (Physical Pin D10)
# HX711 SCK (Clock) -> GPIO19 (Physical Pin D8)
# LED RED (Empty)  -> GPIO21 (Physical Pin D3)
# LED YELLOW (Mid) -> GPIO23 (Physical Pin D5)
# LED BLUE (Full)  -> GPIO2  (Physical Pin D2)
# LED GREEN (WiFi) -> GPIO22 (Physical Pin D4)
# --------------------------------------------------

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  manual_ip:
    static_ip: 192.168.86.165
    gateway: 192.168.86.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "GVz3y64jR+jmPpGrrjFiUcHAgJyGeyiUFpTR7GJskso="

ota:
  - platform: esphome
    password: "efc8345d3562d6f90ed4a58d79fc06d5"

number:
  - platform: template
    name: "Empty Bowl Weight"
    id: empty_weight
    icon: "mdi:scale-off"
    optimistic: true
    min_value: 0
    max_value: 5000
    step: 1
    initial_value: 450
    unit_of_measurement: "g"

  - platform: template
    name: "Full Bowl Weight"
    id: full_weight
    icon: "mdi:scale-balance"
    optimistic: true
    min_value: 0
    max_value: 5000
    step: 1
    initial_value: 1500
    unit_of_measurement: "g"

sensor:
  - platform: hx711
    name: "Raw Water Weight"
    id: raw_weight
    # DT (Data) pin: Connect to D10 on your XIAO board
    dout_pin: GPIO18 
    # SCK (Clock) pin: Connect to D8 on your XIAO board
    clk_pin: GPIO19  
    gain: 128
    update_interval: 1s
    unit_of_measurement: "g"
    filters:
      - calibrate_linear:
          - 0 -> 0
          - 100000 -> 500 # Adjust this once soldered (Known weight test)

  - platform: template
    name: "Water Level Percentage"
    id: water_percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      float current = id(raw_weight).state;
      float empty = id(empty_weight).state;
      float full = id(full_weight).state;
      if (full <= empty) return 0; 
      float percent = ((current - empty) / (full - empty)) * 100.0;
      if (percent < 0) return 0;
      if (percent > 100) return 100;
      return percent;
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x <= 10;' # 0-10% is Empty (RED)
            then:
              - light.turn_on: led_red
              - light.turn_off: led_yellow
              - light.turn_off: led_blue
        - if:
            condition:
              lambda: 'return x > 10 && x < 70;' # 11-69% is Mid (YELLOW)
            then:
              - light.turn_off: led_red
              - light.turn_on: led_yellow
              - light.turn_off: led_blue
        - if:
            condition:
              lambda: 'return x >= 70;' # 70-100% is Full (BLUE)
            then:
              - light.turn_off: led_red
              - light.turn_off: led_yellow
              - light.turn_on: led_blue

output:
  - platform: ledc
    pin: GPIO21 # Labeled D3 on the board - RED
    id: red_out
  - platform: ledc
    pin: GPIO23 # Labeled D5 on the board - YELLOW
    id: yellow_out
  - platform: ledc
    pin: GPIO2  # Labeled D2 on the board - BLUE
    id: blue_out
  - platform: ledc
    pin: GPIO22 # Labeled D4 on the board - GREEN
    id: green_out

light:
  - platform: monochromatic
    name: "Empty Alert LED (Red)"
    id: led_red
    output: red_out
    default_transition_length: 1s
  - platform: monochromatic
    name: "Mid Level LED (Yellow)"
    id: led_yellow
    output: yellow_out
    default_transition_length: 1s
  - platform: monochromatic
    name: "Full Level LED (Blue)"
    id: led_blue
    output: blue_out
    default_transition_length: 1s
  - platform: monochromatic
    name: "WiFi Status LED (Green)"
    id: led_green
    output: green_out

interval:
  - interval: 5s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on: led_green
          else:
            - light.turn_off: led_green
