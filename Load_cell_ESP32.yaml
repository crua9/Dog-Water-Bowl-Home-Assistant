# ==============================================================================
# PROJECT: Smart Dog Water Bowl Sensor
# HARDWARE: ESP32-C6-DevKitC-1, HX711 Load Cell Amplifier, 25kg Load Cell, 4x LEDs
# WIRING:
#   - Load Cell: DT=GPIO18, SCK=GPIO19
#   - LEDs: Red=GPIO21, Yellow=GPIO23, Blue=GPIO2, Green=GPIO22
# 
# WIRE HEALTH CHECK:
#   - Instant check on boot: If sensor is missing, start rolling R->Y->B.
#   - Runtime check: If signal is lost for 3 mins, start rolling R->Y->B.
# ==============================================================================

esphome:
  name: dog-water-sensor
  friendly_name: Dog Water Sensor
  on_boot:
    priority: -10
    then:
      - delay: 5s # Give the sensor a moment to stabilize
      - if:
          condition:
            lambda: 'return isnan(id(raw_sensor).state);'
          then:
            - script.execute: error_roll_script

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  level: INFO 

debug:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  manual_ip:
    static_ip: #The IP address of the device. 
    gateway: 192.168.86.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "" #fill this with your api key

ota:
  platform: esphome
  password: ""  #fill this with your ota key

button:
  - platform: restart
    name: "Restart Dog Bowl ESP"

# --- PERMANENT MEMORY ---
globals:
  - id: g_raw_offset
    type: float
    restore_value: yes
    initial_value: '-13980'
  - id: g_cal_factor
    type: float
    restore_value: yes
    initial_value: '200.0'
  - id: g_red_t
    type: float
    restore_value: yes
    initial_value: '50'      
  - id: g_blue_t
    type: float
    restore_value: yes
    initial_value: '1400'    
  - id: g_brightness
    type: float
    restore_value: yes
    initial_value: '80.0' 
  - id: g_fade
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: g_buffer
    type: float
    restore_value: yes
    initial_value: '20.0' 
  - id: g_last_valid_weight_time
    type: uint32_t 
    initial_value: '0'

switch:
  - platform: template
    name: "Manual Light Control"
    id: manual_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.stop: update_lights_logic
        - script.stop: error_roll_script
    on_turn_off:
      then:
        - script.execute: update_lights_logic

# --- SENSORS & HEALTH ---
sensor:
  - platform: uptime
    name: "Dog Bowl Uptime"

  - platform: debug
    free:
      id: free_ram_raw
      internal: true 
    loop_time:
      id: loop_t
      internal: true 
  
  - platform: template
    name: "Dog Bowl RAM Usage"
    entity_category: "diagnostic"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    lambda: |-
      return (1.0 - (id(free_ram_raw).state / 512000.0)) * 100.0;
  
  - platform: template
    name: "Processor Usage"
    entity_category: "diagnostic"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    lambda: |-
      float usage = (id(loop_t).state / 100.0) * 100.0;
      return (usage > 100.0) ? 100.0 : usage;
  
  - platform: internal_temperature
    name: "Dog Bowl CPU Temp"

  - platform: hx711
    name: "Load Cell Raw Value"
    id: raw_sensor
    dout_pin: 
      number: GPIO18
      mode: INPUT
    clk_pin: GPIO19
    gain: 128
    update_interval: 2s
    on_value:
      then:
        - lambda: "id(g_last_valid_weight_time) = millis();"
        - if:
            condition:
              switch.is_off: manual_mode
            then:
              - script.execute: update_lights_logic

  - platform: template
    name: "Total Weight"
    id: total_weight_g
    unit_of_measurement: "g"
    accuracy_decimals: 1
    update_interval: 2s
    lambda: |-
      uint32_t now = millis();
      if (id(g_last_valid_weight_time) != 0 && (now - id(g_last_valid_weight_time) > 30000)) return NAN;
      if (isnan(id(raw_sensor).state)) return NAN;
      return (id(raw_sensor).state - id(g_raw_offset)) / id(g_cal_factor);

binary_sensor:
  - platform: status
    name: "Dog Bowl Online Status"
  
  - platform: template
    name: "Dog Bowl Needs Refill"
    id: dog_water_bowl_dog_bowl_needs_refill
    device_class: problem
    lambda: |-
      return id(total_weight_g).state <= id(g_red_t);

# --- DASHBOARD CONTROLS ---
number:
  - platform: template
    name: "Manual Raw Offset"
    mode: box
    step: 1
    min_value: -10000000
    max_value: 10000000
    lambda: "return id(g_raw_offset);"
    set_action:
      then: [lambda: "id(g_raw_offset) = x;"]
  - platform: template
    name: "Calibration Factor"
    mode: box
    step: 0.1
    min_value: 0.1
    max_value: 2000
    lambda: "return id(g_cal_factor);"
    set_action:
      then: [lambda: "id(g_cal_factor) = x;"]
  - platform: template
    name: "Red Trigger (Grams)"
    mode: box
    step: 1
    min_value: 0
    max_value: 25000
    lambda: "return id(g_red_t);"
    set_action:
      then: [lambda: "id(g_red_t) = x;"]
  - platform: template
    name: "Blue Trigger (Grams)"
    mode: box
    step: 1
    min_value: 0
    max_value: 25000
    lambda: "return id(g_blue_t);"
    set_action:
      then: [lambda: "id(g_blue_t) = x;"]
  - platform: template
    name: "Flicker Buffer (Grams)"
    mode: box
    step: 1
    min_value: 0
    max_value: 500
    lambda: "return id(g_buffer);"
    set_action:
      then: [lambda: "id(g_buffer) = x;"]
  - platform: template
    name: "LED Brightness"
    mode: box
    unit_of_measurement: "%"
    step: 1
    min_value: 0
    max_value: 100
    lambda: "return id(g_brightness);"
    set_action:
      then: 
        - lambda: "id(g_brightness) = x;"
        - script.execute: update_lights_logic
  - platform: template
    name: "Fade Speed"
    mode: box
    unit_of_measurement: "s"
    step: 0.1
    min_value: 0.0
    max_value: 10.0
    lambda: "return id(g_fade);"
    set_action:
      then: [lambda: "id(g_fade) = x;"]

# --- LIGHTS ---
output:
  - platform: ledc
    pin: GPIO21
    id: red_out
  - platform: ledc
    pin: GPIO23
    id: yellow_out
  - platform: ledc
    pin: GPIO22
    id: green_out
  - platform: ledc
    pin: GPIO2
    id: blue_out

light:
  - platform: monochromatic
    name: "Water LED Red"
    id: led_red
    output: red_out
  - platform: monochromatic
    name: "Water LED Yellow"
    id: led_yellow
    output: yellow_out
  - platform: monochromatic
    name: "Water LED Blue"
    id: led_blue
    output: blue_out
  - platform: monochromatic
    name: "WiFi LED Green"
    id: led_green
    output: green_out

# --- CORE LOGIC ---
script:
  # Rolling error animation: Red -> Yellow -> Blue
  - id: error_roll_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - light.turn_on:
                id: led_red
                brightness: !lambda "return id(g_brightness) / 100.0;"
                transition_length: !lambda "return id(g_fade) * 1000.0;"
            - delay: !lambda "return id(g_fade) * 1000.0;"
            - light.turn_off:
                id: led_red
                transition_length: !lambda "return id(g_fade) * 1000.0;"
            - light.turn_on:
                id: led_yellow
                brightness: !lambda "return id(g_brightness) / 100.0;"
                transition_length: !lambda "return id(g_fade) * 1000.0;"
            - delay: !lambda "return id(g_fade) * 1000.0;"
            - light.turn_off:
                id: led_yellow
                transition_length: !lambda "return id(g_fade) * 1000.0;"
            - light.turn_on:
                id: led_blue
                brightness: !lambda "return id(g_brightness) / 100.0;"
                transition_length: !lambda "return id(g_fade) * 1000.0;"
            - delay: !lambda "return id(g_fade) * 1000.0;"
            - light.turn_off:
                id: led_blue
                transition_length: !lambda "return id(g_fade) * 1000.0;"

  - id: update_lights_logic
    mode: restart
    then:
      - lambda: |-
          float w = id(total_weight_g).state;
          float br = id(g_brightness) / 100.0;
          float fd = id(g_fade) * 1000.0;
          float buffer = id(g_buffer);
          
          if (isnan(w)) return;

          // If we have valid weight, ensure error roll is stopped
          if (id(error_roll_script).is_running()) {
            id(error_roll_script).stop();
          }

          bool is_red = id(led_red).remote_values.is_on();
          bool is_yellow = id(led_yellow).remote_values.is_on();

          if (w <= id(g_red_t)) {
            id(led_red).turn_on().set_brightness(br).set_transition_length(fd).perform();
            id(led_yellow).turn_off().set_transition_length(fd).perform();
            id(led_blue).turn_off().set_transition_length(fd).perform();
          } 
          else if (w >= (id(g_blue_t) + (is_yellow ? buffer : 0.0))) {
            id(led_blue).turn_on().set_brightness(br).set_transition_length(fd).perform();
            id(led_red).turn_off().set_transition_length(fd).perform();
            id(led_yellow).turn_off().set_transition_length(fd).perform();
          } 
          else if (w > (id(g_red_t) + (is_red ? buffer : 0.0))) {
            id(led_yellow).turn_on().set_brightness(br).set_transition_length(fd).perform();
            id(led_red).turn_off().set_transition_length(fd).perform();
            id(led_blue).turn_off().set_transition_length(fd).perform();
          }

          if (id(led_green).remote_values.is_on()) {
             id(led_green).turn_on().set_brightness(br).set_transition_length(fd).perform();
          }

interval:
  - interval: 5s
    then:
      - lambda: |-
          uint32_t now = millis();
          // If we had a reading but it disappeared for 3 minutes
          bool missing_long_time = (id(g_last_valid_weight_time) != 0 && (now - id(g_last_valid_weight_time) > 180000));

          if (missing_long_time) {
              if (!id(error_roll_script).is_running()) {
                  id(error_roll_script).execute();
              }
          } else {
              if (id(error_roll_script).is_running() && !isnan(id(total_weight_g).state)) {
                  id(error_roll_script).stop();
                  id(update_lights_logic).execute();
              }
          }

  - interval: 10s # Wifi Indicator
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: led_green
                brightness: !lambda "return id(g_brightness) / 100.0;"
                transition_length: !lambda "return id(g_fade) * 1000.0;"
          else:
            - light.turn_off: led_green
